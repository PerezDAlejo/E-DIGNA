<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-DIGNA - Analizador de Contraseñas (Solo Frontend)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/zxcvbn/4.4.2/zxcvbn.js"></script>
    <style>
        /* Copiar estilos del archivo original */
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            color: #333;
            margin-bottom: 0.5rem;
            font-size: 2rem;
        }

        .subtitle {
            color: #666;
            font-size: 0.9rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: bold;
        }

        #password-input {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        #password-input:focus {
            outline: none;
            border-color: #667eea;
        }

        #strength-meter {
            width: 100%;
            height: 10px;
            background-color: #e1e5e9;
            border-radius: 5px;
            margin: 10px 0;
            position: relative;
            overflow: hidden;
        }

        #strength-meter::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%;
            background: #ccc;
            border-radius: 5px;
            transition: width 0.3s, background 0.3s;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin: 1.5rem 0;
        }

        #analyze-btn {
            flex: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.3s;
        }

        #analyze-btn:hover {
            transform: translateY(-2px);
        }

        #analyze-btn:active {
            transform: translateY(0);
        }

        #analyze-btn.loading {
            opacity: 0.7;
            cursor: not-allowed;
        }

        #theme-toggle {
            background: #f8f9fa;
            color: #333;
            border: 2px solid #e1e5e9;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        #theme-toggle:hover {
            background: #e9ecef;
        }

        #results {
            margin-top: 1.5rem;
            padding: 1.5rem;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            display: none;
        }

        #results.fade-in {
            display: block;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #results h3 {
            color: #333;
            margin-top: 1rem;
            margin-bottom: 0.5rem;
        }

        #results h3:first-child {
            margin-top: 0;
        }

        #results p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 0.5rem;
        }

        .motivational {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white !important;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            margin-top: 1rem;
            font-weight: bold;
        }

        .warning {
            background: #fff3cd;
            color: #856404;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #ffc107;
            margin-bottom: 1.5rem;
        }

        .api-key-input {
            margin-bottom: 1rem;
        }

        #api-key-input {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            box-sizing: border-box;
        }

        /* Dark mode styles */
        body.dark-mode {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
        }

        body.dark-mode .container {
            background: #2c3e50;
            color: white;
        }

        body.dark-mode .header h1,
        body.dark-mode .input-group label {
            color: white;
        }

        body.dark-mode .subtitle {
            color: #bdc3c7;
        }

        body.dark-mode #password-input,
        body.dark-mode #api-key-input {
            background: #34495e;
            color: white;
            border-color: #4a5f7a;
        }

        body.dark-mode #password-input:focus,
        body.dark-mode #api-key-input:focus {
            border-color: #667eea;
        }

        body.dark-mode #theme-toggle {
            background: #34495e;
            color: white;
            border-color: #4a5f7a;
        }

        body.dark-mode #theme-toggle:hover {
            background: #4a5f7a;
        }

        body.dark-mode #results {
            background: #34495e;
            border-left-color: #667eea;
        }

        body.dark-mode #results h3 {
            color: white;
        }

        body.dark-mode #results p {
            color: #bdc3c7;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 E-DIGNA</h1>
            <p class="subtitle">Analizador de Seguridad de Contraseñas con IA</p>
        </div>

        <div class="warning">
            <strong>⚠️ Versión Solo Frontend:</strong> 
            <br>Para usar el análisis de IA, necesitas ingresar tu propia API key de OpenAI. 
            <br><small>No recomendado para producción por seguridad.</small>
        </div>

        <div class="api-key-input">
            <label for="api-key-input">🔑 API Key de OpenAI (opcional):</label>
            <input type="password" id="api-key-input" placeholder="sk-...">
            <small style="color: #666;">Sin API key solo funciona el análisis básico</small>
        </div>

        <div class="input-group">
            <label for="password-input">Ingresa tu contraseña:</label>
            <input type="password" id="password-input" placeholder="Escribe tu contraseña aquí...">
            <div id="strength-meter"></div>
        </div>

        <div class="button-group">
            <button id="analyze-btn">🤖 Analizar con IA</button>
            <button id="theme-toggle">🌙 Dark Mode</button>
        </div>

        <div id="results"></div>
    </div>

    <script>
        // Script modificado para funcionar sin backend
        document.addEventListener('DOMContentLoaded', function() {
            const passwordInput = document.getElementById('password-input');
            const apiKeyInput = document.getElementById('api-key-input');
            const resultsDiv = document.getElementById('results');
            const analyzeBtn = document.getElementById('analyze-btn');
            const themeToggle = document.getElementById('theme-toggle');

            // Function to update the strength meter
            function updateMeter(width, color, text) {
                let style = document.getElementById('strength-style');
                if (!style) {
                    style = document.createElement('style');
                    style.id = 'strength-style';
                    document.head.appendChild(style);
                }
                style.textContent = `#strength-meter::before { width: ${width}%; background: ${color} !important; }`;
                resultsDiv.innerHTML = text ? `Seguridad actual: ${text}` : '';
            }

            // Real-time password strength
            passwordInput.addEventListener('input', function(e) {
                const password = e.target.value;
                if (password.length === 0) {
                    updateMeter(0, 'transparent', '');
                    resultsDiv.innerHTML = '';
                    resultsDiv.classList.remove('fade-in');
                } else {
                    const result = zxcvbn(password);
                    const score = result.score;
                    let color, text;
                    if (score <= 1) {
                        color = 'red';
                        text = 'Débil';
                    } else if (score === 2) {
                        color = 'yellow';
                        text = 'Media';
                    } else if (score === 3) {
                        color = 'green';
                        text = 'Fuerte';
                    } else if (score === 4) {
                        color = 'limegreen';
                        text = 'Ideal';
                    }
                    const width = (score / 4) * 100;
                    updateMeter(width, color, text);
                    resultsDiv.classList.add('fade-in');
                }
            });

            // AI Analysis
            analyzeBtn.addEventListener('click', async function(e) {
                e.preventDefault();
                const password = passwordInput.value;
                const apiKey = apiKeyInput.value;

                if (!password.trim()) {
                    resultsDiv.innerHTML = '<p>Por favor, ingresa una contraseña para analizar.</p>';
                    resultsDiv.classList.add('fade-in');
                    return;
                }

                analyzeBtn.classList.add('loading');
                analyzeBtn.textContent = '🔄 Analizando...';

                try {
                    const zxcvbnResult = zxcvbn(password);
                    let aiAnalysis = "Análisis básico disponible";
                    let improvedVersion = "No disponible";

                    // Si hay API key, intentamos usar OpenAI
                    if (apiKey) {
                        try {
                            const response = await fetch('https://api.openai.com/v1/chat/completions', {
                                method: 'POST',
                                headers: {
                                    'Authorization': `Bearer ${apiKey}`,
                                    'Content-Type': 'application/json'
                                },
                                body: JSON.stringify({
                                    model: 'gpt-3.5-turbo',
                                    messages: [{
                                        role: 'user',
                                        content: `Analiza la seguridad de esta contraseña: "${password}". Proporciona un análisis detallado en español incluyendo vulnerabilidades potenciales y sugerencias de mejora. También sugiere una versión mejorada de la contraseña. Responde en formato JSON con las claves: "analysis", "improved_version".`
                                    }],
                                    max_tokens: 500
                                })
                            });

                            if (response.ok) {
                                const data = await response.json();
                                const content = data.choices[0].message.content;
                                
                                try {
                                    const parsed = JSON.parse(content);
                                    aiAnalysis = parsed.analysis || content;
                                    improvedVersion = parsed.improved_version || "No disponible";
                                } catch {
                                    aiAnalysis = content;
                                }
                            } else {
                                throw new Error('Error en API de OpenAI');
                            }
                        } catch (error) {
                            aiAnalysis = `Error en análisis de IA: ${error.message}. Usando análisis básico.`;
                        }
                    }

                    // Análisis básico como fallback
                    if (aiAnalysis === "Análisis básico disponible") {
                        if (zxcvbnResult.score <= 1) {
                            aiAnalysis = "Tu contraseña es muy débil. Considera usar más caracteres, números y símbolos.";
                        } else if (zxcvbnResult.score === 2) {
                            aiAnalysis = "Tu contraseña tiene fuerza media. Puedes mejorarla agregando más caracteres.";
                        } else {
                            aiAnalysis = "Tu contraseña es fuerte. Buen trabajo en la seguridad.";
                        }
                    }

                    resultsDiv.innerHTML = `
                        <h3>Análisis de IA:</h3>
                        <p>${aiAnalysis}</p>
                        <h3>Fuerza de la Contraseña:</h3>
                        <p>${zxcvbnResult.score}/4</p>
                        <h3>Consejos:</h3>
                        <p>${zxcvbnResult.feedback.suggestions ? zxcvbnResult.feedback.suggestions.join(', ') : 'Ninguno'}</p>
                        <h3>Versión Mejorada:</h3>
                        <p>${improvedVersion}</p>
                        <p class="motivational">¡Recuerda, una contraseña fuerte es tu primera línea de defensa!</p>
                    `;
                    resultsDiv.classList.add('fade-in');

                } catch (error) {
                    resultsDiv.innerHTML = '<p>Error al analizar la contraseña. Por favor, inténtalo de nuevo.</p>';
                    console.error('Error:', error);
                    resultsDiv.classList.add('fade-in');
                } finally {
                    analyzeBtn.classList.remove('loading');
                    analyzeBtn.textContent = '🤖 Analizar con IA';
                }
            });

            // Theme toggle
            themeToggle.addEventListener('click', function() {
                document.body.classList.toggle('dark-mode');
                if (document.body.classList.contains('dark-mode')) {
                    themeToggle.innerHTML = '☀️ Light Mode';
                } else {
                    themeToggle.innerHTML = '🌙 Dark Mode';
                }
            });
        });
    </script>
</body>
</html>
